# Example: Benchmark with Separate LLM for Post-Processor
#
# - Main agent uses powerful LLM (e.g., GPT-5) for complex reasoning
# - Post-processor uses cheaper LLM (e.g., GPT-5-mini) for simple filtering
# - Cost optimization: expensive LLM only for agent tasks, cheap LLM for filtering

# Main agent LLM - powerful model for complex tasks
kind: llm
spec:
  name: main-llm
  type: claude_gateway
  config:
    model_name: claude-sonnet-4

---
# Post-processor LLM - cheaper/faster model for filtering
kind: llm
spec:
  name: postprocessor-llm
  type: openai
  config:
    model_name: gpt-5-mini  # Cheaper model for simple code generation

---
# Wrapper configuration with separate LLM
kind: wrapper
spec:
  name: yfinance-wrapper
  enabled: true
  token_threshold: 2000
  post_process_llm:     # Use separate LLM config
    llm: postprocessor-llm  # Reference to the cheaper LLM
  skip_iteration_on_size_failure: false
  max_iterations: 3
  llm_timeout: 500

---
# Agent uses the main (expensive) LLM
kind: agent
spec:
  name: fc-agent
  type: function_call
  config:
    llm: main-llm          # Agent uses GPT-5
    wrapper: yfinance-wrapper  # Wrapper uses GPT-5-mini via post_process_llm
    instruction: You are an agent for financial analysis. If you need to calculate the result, you can use the calculator tool.
    max_iterations: 15
    summarize_tool_response: false
    servers:
      - name: yfinance
      - name: calculator

---
kind: benchmark
spec:
  description: Test agent with separate LLM for post-processing (cost optimization)
  agent: fc-agent
  tasks:
